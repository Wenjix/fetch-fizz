name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync locked dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          git lfs install
          GIT_LFS_SKIP_SMUDGE=1 uv sync --locked --all-extras

      - name: Unit tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest -q
